[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --html=artifacts/report.html
    --self-contained-html
# Disabled reruns to ensure usage errors (like missing pytest-rerunfailures) don't crash the simulation
#    --reruns 3
#    --reruns-delay 1
markers =
    smoke: Smoke tests
    regression: Regression tests
    login: Login page tests
    signup: Signup page tests
    welcome: Welcome page tests
    slow: Slow running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning